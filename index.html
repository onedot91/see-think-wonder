<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사고루틴</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="workspace">
      <section class="role-view" id="roleView">
        <div class="backend-status is-checking" id="backendStatus" role="status" aria-live="polite" aria-label="연결 확인">
          <span class="backend-status-dot" aria-hidden="true"></span>
          <span class="visually-hidden" id="backendStatusText">연결 확인</span>
        </div>
        <button class="role-button" id="studentRoleButton" type="button">학생</button>
        <button class="role-button" id="teacherRoleButton" type="button">교사</button>
      </section>

      <section class="teacher-start-view" id="teacherStartView" hidden>
        <header class="view-head teacher-mode-head">
          <h1>교사 화면</h1>
        </header>
        <div class="teacher-start-choice-grid">
          <button class="teacher-start-choice is-stw" id="teacherStwStartButton" type="button">
            <span>보기 · 생각하기 · 궁금하기</span>
          </button>
          <button class="teacher-start-choice is-summary" id="teacherSummaryStartButton" type="button">
            <span>헤드라인</span>
          </button>
        </div>
      </section>

      <section class="teacher-summary-setup-view" id="teacherSummarySetupView" hidden>
        <header class="view-head teacher-mode-head">
          <h1>헤드라인</h1>
        </header>
        <section class="teacher-upload-panel teacher-text-upload-panel">
          <div>
            <h2>수업 글</h2>
            <p id="summaryTextStatus">글을 입력해 주세요.</p>
          </div>
          <textarea class="teacher-summary-text-input" id="summaryTextInput" placeholder="수업에서 사용할 글을 넣어 주세요."></textarea>
          <div class="teacher-upload-actions">
            <button class="secondary-button upload-button" id="summaryTextRegisterButton" type="button">등록</button>
          </div>
        </section>
        <button class="teacher-start-choice is-summary" id="summaryStartButton" type="button">
          <span>시작</span>
        </button>
      </section>

      <section class="teacher-mode-view" id="teacherModeView" hidden>
        <header class="view-head teacher-mode-head">
          <h1>진행 방식</h1>
        </header>
        <section class="teacher-upload-panel">
          <div>
            <h2>수업 사진</h2>
            <p id="classImageStatus">사진을 업로드해 주세요.</p>
          </div>
          <img class="teacher-upload-preview" id="classImagePreview" alt="업로드한 수업 사진" hidden />
          <div class="teacher-upload-actions">
            <label class="secondary-button upload-button" for="classImageInput">업로드</label>
            <button class="secondary-button upload-cancel-button" id="classImageCancelButton" type="button" hidden>업로드 취소</button>
          </div>
          <input id="classImageInput" type="file" accept="image/*" hidden />
        </section>
        <div class="teacher-mode-choice-grid">
          <button class="teacher-mode-choice is-sequential" type="button" data-open-teacher-mode="sequential">
            <span>순차 진행</span>
          </button>
          <button class="teacher-mode-choice is-combined" type="button" data-open-teacher-mode="combined">
            <span>한 번에 작성</span>
          </button>
        </div>
      </section>

      <section class="app-view" id="teacherView" hidden>
        <header class="view-head">
          <h1><span id="teacherClearTrigger" title="관리 버튼 표시">결</span>과</h1>
          <div class="teacher-mode-tabs" id="teacherModeTabs"></div>
          <div class="teacher-top-tabs" id="teacherTopTabs"></div>
        </header>

        <div class="empty-state" id="emptyState">아직 없습니다.</div>
        <div class="response-list" id="responseList"></div>
      </section>

      <section class="app-view" id="studentView" hidden>
        <header class="view-head">
          <h1 id="studentStepTitle">학생 번호</h1>
        </header>
        <figure class="class-image-card" id="studentClassImageCard" tabindex="0" role="button" aria-label="수업 사진 크게 보기" hidden>
          <img id="studentClassImage" alt="수업 사진" />
        </figure>

        <form id="studentForm">
          <section class="student-step" data-step="student">
            <div class="student-number-entry" id="groupButtons">
              <label class="student-number-label" for="studentNumberInput">내 번호</label>
              <input
                class="student-number-input"
                id="studentNumberInput"
                type="number"
                inputmode="numeric"
                min="1"
                max="23"
                placeholder="1~23"
                autocomplete="off"
              />
            </div>
          </section>

          <section class="student-step" data-step="waiting" hidden>
            <div class="student-waiting-card">
              <div class="student-waiting-spinner" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <strong class="student-waiting-number" id="studentWaitingNumber"></strong>
            </div>
          </section>

          <section class="student-step" data-step="see" hidden>
            <div class="item-list" id="seeList"></div>
          </section>

          <section class="student-step" data-step="think" hidden>
            <div class="item-list chain-list" id="thinkList"></div>
          </section>

          <section class="student-step" data-step="wonder" hidden>
            <div class="item-list chain-list" id="wonderList"></div>
          </section>

          <section class="student-step" data-step="combined" hidden>
            <div class="combined-list" id="combinedList"></div>
          </section>

          <section class="student-step" data-step="summary" hidden>
            <div class="summary-student-list" id="summaryList"></div>
          </section>

        </form>
        <div class="student-top-actions">
          <button class="secondary-button" id="studentResultButton" type="button" hidden>결과 보기</button>
          <button class="primary-button" id="topNextButton" type="button">다음</button>
        </div>
      </section>

      <section class="student-waiting-view" id="studentWaitingView" hidden>
        <div class="backend-status is-checking" id="waitingBackendStatus" aria-hidden="true">
          <span class="backend-status-dot" aria-hidden="true"></span>
        </div>
        <section class="student-waiting-page-card" aria-live="polite">
          <div class="student-waiting-spinner" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <strong class="student-waiting-number" id="studentWaitingPageNumber"></strong>
          <h1>대기 중</h1>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="confirmModal" hidden>
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="modal-head">
          <h2 id="confirmModalTitle">확인</h2>
          <div class="modal-actions">
            <button class="secondary-button" id="modalBackButton" type="button">수정하기</button>
            <button class="primary-button" id="modalSubmitButton" type="button">제출</button>
          </div>
        </div>
        <div class="modal-sentence-list" id="modalSentenceList"></div>
      </section>
    </div>

    <div class="image-lightbox" id="classImageLightbox" hidden>
      <button class="image-lightbox-close" id="classImageLightboxClose" type="button" aria-label="닫기">닫기</button>
      <img id="classImageLightboxImage" alt="수업 사진 크게 보기" />
    </div>

    <div class="student-focus-modal" id="studentFocusModal" hidden>
      <section class="student-focus-card" role="alertdialog" aria-modal="true">
        <p>친구의 발표를 들어봅시다</p>
      </section>
    </div>

    <script type="module" src="/script.js"></script>
  </body>
</html>
