<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>보기 · 생각하기 · 궁금해하기</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="workspace">
      <section class="role-view" id="roleView">
        <div class="backend-status is-checking" id="backendStatus" role="status" aria-live="polite" aria-label="연결 확인">
          <span class="backend-status-dot" aria-hidden="true"></span>
          <span class="visually-hidden" id="backendStatusText">연결 확인</span>
        </div>
        <button class="role-button" id="studentRoleButton" type="button">학생</button>
        <button class="role-button" id="teacherRoleButton" type="button">교사</button>
      </section>

      <section class="teacher-mode-view" id="teacherModeView" hidden>
        <header class="view-head teacher-mode-head">
          <h1>진행 방식</h1>
          <button class="secondary-button" data-change-role type="button">처음으로</button>
        </header>
        <section class="teacher-upload-panel">
          <div>
            <h2>수업 사진</h2>
            <p id="classImageStatus">4:3 사진을 업로드해 주세요.</p>
          </div>
          <img class="teacher-upload-preview" id="classImagePreview" alt="업로드한 수업 사진" hidden />
          <label class="secondary-button upload-button" for="classImageInput">업로드</label>
          <input id="classImageInput" type="file" accept="image/*" hidden />
        </section>
        <div class="teacher-mode-choice-grid">
          <button class="teacher-mode-choice is-sequential" type="button" data-open-teacher-mode="sequential">
            <span>순차 진행</span>
            <small>보기, 생각하기, 궁금해하기를 단계별로 진행합니다.</small>
          </button>
          <button class="teacher-mode-choice is-combined" type="button" data-open-teacher-mode="combined">
            <span>한 번에 작성</span>
            <small>한 페이지에서 보기, 생각하기, 궁금해하기를 함께 작성합니다.</small>
          </button>
        </div>
      </section>

      <section class="app-view" id="teacherView" hidden>
        <header class="view-head">
          <h1>결과</h1>
          <div class="teacher-mode-tabs" id="teacherModeTabs"></div>
          <div class="teacher-top-tabs" id="teacherTopTabs"></div>
          <button class="secondary-button" data-change-role type="button">처음으로</button>
        </header>

        <div class="empty-state" id="emptyState">아직 없습니다.</div>
        <div class="response-list" id="responseList"></div>
      </section>

      <section class="app-view" id="studentView" hidden>
        <header class="view-head">
          <h1 id="studentStepTitle">학생 번호</h1>
        </header>
        <figure class="class-image-card" id="studentClassImageCard" hidden>
          <img id="studentClassImage" alt="수업 사진" />
        </figure>

        <form id="studentForm">
          <section class="student-step" data-step="student">
            <div class="student-number-entry" id="groupButtons">
              <label class="student-number-label" for="studentNumberInput">내 번호</label>
              <input
                class="student-number-input"
                id="studentNumberInput"
                type="number"
                inputmode="numeric"
                min="1"
                max="23"
                placeholder="1~23"
                autocomplete="off"
              />
            </div>
          </section>

          <section class="student-step" data-step="waiting" hidden>
            <div class="student-waiting-card">
              <div class="student-waiting-spinner" aria-hidden="true"></div>
              <p>교사가 진행 방식을 선택하는 중입니다.</p>
              <small>잠시만 기다려 주세요.</small>
            </div>
          </section>

          <section class="student-step" data-step="see" hidden>
            <div class="item-list" id="seeList"></div>
          </section>

          <section class="student-step" data-step="think" hidden>
            <div class="item-list chain-list" id="thinkList"></div>
          </section>

          <section class="student-step" data-step="wonder" hidden>
            <div class="item-list chain-list" id="wonderList"></div>
          </section>

          <section class="student-step" data-step="combined" hidden>
            <div class="combined-list" id="combinedList"></div>
          </section>

        </form>
        <div class="student-top-actions">
          <button class="secondary-button" id="studentResultButton" type="button" hidden>결과 보기</button>
          <button class="primary-button" id="topNextButton" type="button">다음</button>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="confirmModal" hidden>
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="modal-head">
          <h2 id="confirmModalTitle">확인</h2>
          <div class="modal-actions">
            <button class="secondary-button" id="modalBackButton" type="button">수정하기</button>
            <button class="primary-button" id="modalSubmitButton" type="button">제출</button>
          </div>
        </div>
        <div class="modal-sentence-list" id="modalSentenceList"></div>
      </section>
    </div>

    <script type="module" src="/script.js"></script>
  </body>
</html>
